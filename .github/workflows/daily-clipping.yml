name: KBO 데일리 클리핑

on:
  schedule:
    - cron: "50 23 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: 파이썬 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -r requirements.txt

      - name: 리포트 생성
        env:
          KBO_MODE: ${{ vars.KBO_MODE || 'sample' }}
        run: python run.py

      - name: 아카이브 커밋
        run: |
          git config user.name "kbo-clipping-bot"
          git config user.email "actions@github.com"
          git add clippings/
          git commit -m "clipping: $(date -u +'%Y-%m-%d')" || echo "변경 없음"
          git push
